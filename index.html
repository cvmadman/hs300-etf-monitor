<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沪深300ETF份额监控工具</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.1); 
            padding: 30px; 
            display: flex;
            gap: 30px;
        }
        /* 左侧固定菜单 */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
        }
        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e5e7eb;
        }
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .menu-item {
            padding: 10px 15px;
            border-radius: 6px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            font-size: 14px;
            color: #374151;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-item:hover {
            background: #f3f4f6;
        }
        .menu-item.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }
        .menu-item.active .change-pct {
            color: rgba(255,255,255,0.9);
        }
        .change-pct {
            font-size: 12px;
            font-weight: 600;
        }
        .change-pct.positive {
            color: #ef4444;
        }
        .change-pct.negative {
            color: #10b981;
        }
        /* 右侧主内容 */
        .main-content {
            flex: 1;
        }
        .header { margin-bottom: 20px; text-align: center; }
        .header h1 { color: #1f2937; font-size: 24px; margin-bottom: 8px; }
        .header p { color: #6b7280; font-size: 13px; }
        .control-bar { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 15px; 
            align-items: center; 
            flex-wrap: wrap;
        }
        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-item label {
            font-size: 14px;
            color: #374151;
        }
        .control-item input {
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        .control-item button { 
            padding: 8px 16px; 
            border: 1px solid #d1d5db; 
            border-radius: 8px; 
            font-size: 14px; 
            background: white; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .control-item button:hover { background: #f3f4f6; }
        .update-info { color: #10b981; font-size: 13px; }
        #chart { width: 100%; height: 420px; }
        #barChart { width: 100%; height: 180px; margin-top: 10px; }
        .data-table { margin-top: 25px; overflow-x: auto; }
        .data-table h3 { color: #1f2937; margin-bottom: 12px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
        th { background: #f9fafb; color: #374151; font-weight: 600; }
        th:first-child, td:first-child { text-align: left; min-width: 100px; }
        tr:hover { background: #f9fafb; }
        .source-note { 
            margin-top: 15px; 
            padding: 12px; 
            background: #f0f9ff; 
            border-radius: 8px; 
            color: #0369a1; 
            font-size: 12px; 
            line-height: 1.5; 
        }
        .loading, .error {
            text-align: center;
            padding: 100px 20px;
            font-size: 16px;
        }
        .loading { color: #6b7280; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧固定菜单（完全保留原始名称） -->
        <div class="sidebar">
            <div class="sidebar-title">ETF选择</div>
            <div class="menu-list">
                <div class="menu-item active" data-key="total">
                    <span>9只合计总份额</span>
                    <span class="change-pct" id="pct-total"></span>
                </div>
                <div class="menu-item" data-key="510300">
                    <span>510300 华泰柏瑞</span>
                    <span class="change-pct" id="pct-510300"></span>
                </div>
                <div class="menu-item" data-key="510310">
                    <span>510310 易方达</span>
                    <span class="change-pct" id="pct-510310"></span>
                </div>
                <div class="menu-item" data-key="510330">
                    <span>510330 华夏</span>
                    <span class="change-pct" id="pct-510330"></span>
                </div>
                <div class="menu-item" data-key="510360">
                    <span>510360 广发</span>
                    <span class="change-pct" id="pct-510360"></span>
                </div>
                <div class="menu-item" data-key="510350">
                    <span>510350 工银</span>
                    <span class="change-pct" id="pct-510350"></span>
                </div>
                <div class="menu-item" data-key="510390">
                    <span>510390 平安</span>
                    <span class="change-pct" id="pct-510390"></span>
                </div>
                <div class="menu-item" data-key="510320">
                    <span>510320 中金</span>
                    <span class="change-pct" id="pct-510320"></span>
                </div>
                <div class="menu-item" data-key="510380">
                    <span>510380 国泰</span>
                    <span class="change-pct" id="pct-510380"></span>
                </div>
                <div class="menu-item" data-key="510370">
                    <span>510370 兴业</span>
                    <span class="change-pct" id="pct-510370"></span>
                </div>
            </div>
        </div>

        <!-- 右侧主内容 -->
        <div class="main-content">
            <div class="header">
                <h1>沪深300ETF份额监控工具</h1>
                <p>数据来源：上海证券交易所官网 | 自动每日更新</p>
            </div>

            <div class="control-bar">
                <!-- 区间选取功能 -->
                <div class="control-item">
                    <label>区间：</label>
                    <input type="date" id="startDate">
                    <span>~</span>
                    <input type="date" id="endDate">
                    <button id="applyRange">应用区间</button>
                </div>
                <div class="control-item">
                    <button id="resetAxis">重置纵轴+恢复默认区间</button>
                </div>
                <div class="update-info" id="updateInfo">
                    最后更新：加载中...
                </div>
            </div>

            <div id="loading" class="loading">正在加载数据，请稍候...</div>
            <div id="error" class="error" style="display: none;"></div>

            <!-- 折线图 + 柱状图 -->
            <div id="chart" style="display: none;"></div>
            <div id="barChart" style="display: none; margin-top: 10px;"></div>

            <div class="data-table" id="dataTableWrapper" style="display: none; margin-top: 25px;">
                <h3>日度数据明细</h3>
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>份额（亿份）</th>
                            <th>较前日变动（亿份）</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="source-note" id="sourceNote" style="display: none;">
                <strong>说明：</strong>本工具每日18:00自动从上海证券交易所官网抓取最新清算后份额数据，覆盖2024-09-01以来所有交易日，数据100%来自上交所官方披露。
            </div>
        </div>
    </div>

    <script>
        // 初始化图表
        const chart = echarts.init(document.getElementById('chart'));
        const barChart = echarts.init(document.getElementById('barChart'));
        echarts.connect([chart, barChart]);
        
        // 全局数据
        const allData = {
            dates: [], total: [],
            510300: [], 510310: [], 510330: [], 510360: [],
            510350: [], 510390: [], 510320: [], 510380: [], 510370: []
        };
        // ETF名称映射（完全保留原始名称）
        const etfNames = {
            total: '9只合计总份额',
            510300: '510300 华泰柏瑞沪深300ETF',510310: '510310 易方达沪深300ETF',
            510330: '510330 华夏沪深300ETF',510360: '510360 广发沪深300ETF',
            510350: '510350 工银沪深300ETF',510390: '510390 平安沪深300ETF',
            510320: '510320 中金沪深300ETF',510380: '510380 国泰沪深300ETF',
            510370: '510370 兴业沪深300ETF'
        };
        const GLOBAL_START_DATE = '2024-09-01';
        let currentKey = 'total';
        let currentStart = GLOBAL_START_DATE;
        let currentEnd;

        // 显示错误
        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = msg;
            console.error(msg);
        }

        // 标准化数据：自动排序日期，保证从旧到新，兼容后端各种输出顺序
        function normalizeData(rawData) {
            if (!rawData.dates || !rawData.dates.length) {
                throw new Error('数据中没有日期信息，请检查后端导出的JSON文件');
            }

            // 1. 生成索引排序，把日期从小到大排
            const indices = rawData.dates.map((date, idx) => ({ date, idx }))
                .sort((a, b) => a.date.localeCompare(b.date))
                .map(item => item.idx);

            // 2. 重新排序所有数据
            const normalized = { dates: [], total: [] };
            for (const code of Object.keys(allData)) {
                normalized[code] = [];
            }

            for (const newIdx of indices) {
                normalized.dates.push(rawData.dates[newIdx]);
                normalized.total.push(rawData.total[newIdx]);
                for (const code of Object.keys(allData)) {
                    if (code === 'dates' || code === 'total') continue;
                    if (rawData[code] && rawData[code][newIdx] !== undefined) {
                        normalized[code].push(rawData[code][newIdx]);
                    } else {
                        normalized[code].push(null);
                    }
                }
            }

            // 3. 校验数据长度
            const len = normalized.dates.length;
            for (const key of Object.keys(normalized)) {
                if (normalized[key].length !== len) {
                    console.warn(`${key} 数据长度不匹配，预期${len}，实际${normalized[key].length}`);
                }
            }

            return normalized;
        }

        // 加载数据
        async function loadData() {
            try {
                // 强制不缓存，每次加载最新数据
                const res = await fetch('etf_data.json?' + new Date().getTime(), {
                    cache: 'no-cache',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (!res.ok) {
                    if (res.status === 404) {
                        throw new Error('找不到etf_data.json文件，请确认它和这个HTML文件在同一个文件夹里');
                    } else if (res.status === 0) {
                        throw new Error('跨域请求被阻止，请不要直接双击打开HTML，建议用本地服务器（如python -m http.server）打开，或者上传到网站服务器');
                    } else {
                        throw new Error(`加载失败，HTTP错误: ${res.status} ${res.statusText}`);
                    }
                }

                const rawData = await res.json();
                
                // 校验数据格式
                if (!rawData || typeof rawData !== 'object') {
                    throw new Error('数据格式错误，不是有效的JSON文件');
                }
                if (!rawData.dates || !rawData.total) {
                    throw new Error('数据格式不匹配，缺少dates或total字段，请确认是正确的etf_data.json');
                }

                // 标准化数据，自动排序日期，兼容后端各种输出顺序
                const normalizedData = normalizeData(rawData);
                // 赋值到全局
                Object.assign(allData, normalizedData);

                // 检查数据是否为空
                if (!allData.dates.length) {
                    throw new Error('没有有效的历史数据');
                }

                currentEnd = allData.dates[allData.dates.length-1];
                // 初始化日期输入框
                document.getElementById('startDate').value = currentStart;
                document.getElementById('endDate').value = currentEnd;
                // 计算每个ETF的当日变动百分比，更新左侧菜单
                updateMenuChangePct();
                // 渲染所有
                renderAll();
                // 更新时间
                document.getElementById('updateInfo').textContent = `最后更新：${currentEnd} 18:00:00`;

                // 隐藏加载，显示内容
                document.getElementById('loading').style.display = 'none';
                document.getElementById('chart').style.display = 'block';
                document.getElementById('barChart').style.display = 'block';
                document.getElementById('dataTableWrapper').style.display = 'block';
                document.getElementById('sourceNote').style.display = 'block';

            } catch(e) {
                showError(`数据加载失败: ${e.message}`);
                console.error('加载数据失败详情:', e);
            }
        }

        // 更新左侧菜单的当日变动百分比
        function updateMenuChangePct() {
            const keys = ['total', '510300', '510310', '510330', '510360', '510350', '510390', '510320', '510380', '510370'];
            keys.forEach(key => {
                const d = allData[key];
                if (!d || d.length < 2) {
                    document.getElementById(`pct-${key}`).textContent = '无数据';
                    return;
                }
                const last = d[d.length-1];
                const prev = d[d.length-2];
                if (prev === 0) {
                    document.getElementById(`pct-${key}`).textContent = '-';
                    return;
                }
                const pct = ((last - prev) / prev) * 100;
                const el = document.getElementById(`pct-${key}`);
                el.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
                el.className = `change-pct ${pct >= 0 ? 'positive' : 'negative'}`;
            });
        }

        // 过滤区间数据
        function filterRangeData(key, start, end) {
            const dates = allData.dates;
            const values = allData[key];
            const filteredDates = [];
            const filteredValues = [];
            for(let i=0; i<dates.length; i++) {
                if(dates[i] >= start && dates[i] <= end) {
                    filteredDates.push(dates[i]);
                    filteredValues.push(values[i]);
                }
            }
            return { dates: filteredDates, values: filteredValues };
        }

        // 计算变动百分比
        function calcDailyChangePercent(data) {
            const changePercent = []; const colors = [];
            for(let i=0; i<data.length; i++) {
                if(i===0) { changePercent.push(null); colors.push('transparent'); }
                else {
                    const p = data[i-1], c = data[i];
                    if(p === 0) {
                        changePercent.push(null);
                        colors.push('transparent');
                    } else {
                        const per = ((c-p)/p)*100;
                        changePercent.push(per);
                        colors.push(per >=0 ? '#ef4444' : '#10b981');
                    }
                }
            }
            return { changePercent, colors };
        }

        // 渲染折线图（纯直线）
        function renderChart(key, start, end) {
            const { dates, values } = filterRangeData(key, start, end);
            if (!dates.length) {
                alert('该区间没有数据');
                return;
            }
            const validValues = values.filter(v => v !== null && v !== undefined);
            const min = Math.min(...validValues)*0.99, max = Math.max(...validValues)*1.01;
            const opt = {
                title:{text:etfNames[key]+' 份额趋势',left:'center',textStyle:{color:'#1f2937'}},
                tooltip:{trigger:'axis',formatter:p=>`日期：${p[0].axisValue}<br/>份额：${p[0].value.toFixed(4)}亿份`},
                grid:{left:'3%',right:'4%',bottom:'0%',containLabel:true},
                xAxis:{type:'category',data:dates,axisLabel:{rotate:45,fontSize:10}},
                yAxis:{type:'value',name:'份额（亿份）',min,max,splitLine:{lineStyle:{type:'dashed'}}},
                series:[{
                    type:'line',data:values,smooth:false, // 纯直线
                    lineStyle:{width:2,color:key=='total'?'#ff0000':'#0066cc'},
                    itemStyle:{color:key=='total'?'#ff0000':'#0066cc'}
                }],
                dataZoom:[{type:'inside'},{type:'slider',show:false}]
            };
            chart.setOption(opt,true);
            // 点击局部缩放
            chart.off('click');
            chart.on('click', function(params) {
                const idx = params.dataIndex;
                const s = Math.max(0, idx-5), e = Math.min(values.length-1, idx+5);
                const rd = values.slice(s,e+1).filter(v => v !== null);
                if (rd.length) {
                    chart.setOption({yAxis:{min:Math.min(...rd)*0.995,max:Math.max(...rd)*1.005}});
                }
            });
        }

        // 渲染柱状图（变动百分比）
        function renderBar(key, start, end) {
            const { dates, values } = filterRangeData(key, start, end);
            const { changePercent, colors } = calcDailyChangePercent(values);
            const opt = {
                tooltip:{trigger:'axis',formatter:p=>{
                    const d = p[0].axisValue, v = p[0].value;
                    if(v===null) return `日期：${d}<br/>变动：无`;
                    return `日期：${d}<br/>变动：${v>=0?'+':''}${v.toFixed(4)}%`;
                }},
                grid:{left:'3%',right:'4%',top:'5%',bottom:'15%',containLabel:true},
                xAxis:{type:'category',data:dates,axisLabel:{rotate:45,fontSize:10}},
                yAxis:{type:'value',name:'变动%',axisLabel:{formatter:'{value}%'},splitLine:{lineStyle:{type:'dashed'}}},
                series:[{
                    type:'bar',data:changePercent,barWidth:'60%',
                    itemStyle:{color:p=>colors[p.dataIndex]}
                }],
                dataZoom:[{type:'slider',height:20,bottom:0},{type:'inside'}]
            };
            barChart.setOption(opt,true);
        }

        // 渲染表格
        function renderTable(key, start, end) {
            const { dates, values } = filterRangeData(key, start, end);
            const tb = document.getElementById('tableBody'); tb.innerHTML='';
            for(let i=dates.length-1;i>=0;i--){
                const cv = values[i];
                if (cv === null) continue;
                const pv = i>0?values[i-1]:cv;
                const ch = cv-pv;
                tb.innerHTML += `<tr>
                    <td>${dates[i]}</td>
                    <td>${cv.toFixed(4)}</td>
                    <td style="color:${ch>=0?'#ef4444':'#10b981'}">${ch>=0?'+':''}${ch.toFixed(4)}</td>
                </tr>`;
            }
        }

        // 统一渲染
        function renderAll() {
            renderChart(currentKey, currentStart, currentEnd);
            renderBar(currentKey, currentStart, currentEnd);
            renderTable(currentKey, currentStart, currentEnd);
        }

        // 左侧菜单点击
        document.querySelectorAll('.menu-item').forEach(item=>{
            item.addEventListener('click',()=>{
                document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'));
                item.classList.add('active');
                currentKey = item.dataset.key;
                renderAll();
            });
        });

        // 区间应用
        document.getElementById('applyRange').addEventListener('click',()=>{
            const s = document.getElementById('startDate').value;
            const e = document.getElementById('endDate').value;
            if(!s || !e) { alert('请选择完整的日期区间'); return; }
            if(s > e) { alert('开始日期不能晚于结束日期'); return; }
            currentStart = s;
            currentEnd = e;
            renderAll();
            // 计算区间整体变动
            const d = allData[currentKey];
            const dates = allData.dates;
            let startIdx = -1, endIdx = -1;
            for(let i=0; i<dates.length; i++) {
                if(dates[i] === s) startIdx = i;
                if(dates[i] === e) endIdx = i;
            }
            if(startIdx >=0 && endIdx >=0) {
                const startVal = d[startIdx], endVal = d[endIdx];
                if (startVal === 0) {
                    alert('区间起始数据为0，无法计算变动');
                    return;
                }
                const change = endVal - startVal;
                const pct = ((endVal - startVal) / startVal) * 100;
                alert(`区间统计：
日期：${s} ~ ${e}
份额变动：${change >=0 ? '+' : ''}${change.toFixed(4)} 亿份
变动百分比：${pct >=0 ? '+' : ''}${pct.toFixed(4)}%`);
            }
        });

        // 重置按钮
        document.getElementById('resetAxis').addEventListener('click',()=>{
            // 恢复默认区间
            currentStart = GLOBAL_START_DATE;
            currentEnd = allData.dates[allData.dates.length-1];
            document.getElementById('startDate').value = currentStart;
            document.getElementById('endDate').value = currentEnd;
            // 重新渲染
            renderAll();
            // 重置缩放
            chart.dispatchAction({type:'dataZoom',start:0,end:100});
            barChart.dispatchAction({type:'dataZoom',start:0,end:100});
            alert('已重置：恢复默认区间 2024-09-01 ~ 最新日期');
        });

        // 自适应
        window.addEventListener('resize',()=>{chart.resize();barChart.resize();});
        loadData();
    </script>
</body>
</html>
