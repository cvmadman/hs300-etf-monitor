<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沪深300ETF份额监控工具</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 30px; }
        .header { margin-bottom: 30px; text-align: center; }
        .header h1 { color: #1f2937; font-size: 28px; margin-bottom: 10px; }
        .header p { color: #6b7280; font-size: 14px; }
        .control-bar { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .control-item { display: flex; align-items: center; gap: 10px; }
        .control-item label { color: #374151; font-weight: 500; }
        .control-item select { padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; background: white; cursor: pointer; }
        .control-item button { padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; background: white; cursor: pointer; transition: all 0.2s; }
        .control-item button:hover { background: #f3f4f6; }
        .update-info { color: #10b981; font-size: 13px; }
        #chart { width: 100%; height: 450px; }
        #barChart { width: 100%; height: 200px; margin-top: 10px; }
        .data-table { margin-top: 30px; overflow-x: auto; }
        .data-table h3 { color: #1f2937; margin-bottom: 15px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; color: #374151; font-weight: 600; }
        th:first-child, td:first-child { text-align: left; min-width: 100px; }
        tr:hover { background: #f9fafb; }
        .source-note { margin-top: 20px; padding: 15px; background: #f0f9ff; border-radius: 8px; color: #0369a1; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>沪深300ETF份额监控工具</h1>
            <p>数据来源：上海证券交易所官网 | 自动每日更新</p>
        </div>
        <div class="control-bar">
            <div class="control-item">
                <label>查看维度：</label>
                <select id="etfSelect">
                    <option value="total">9只合计总份额</option>
                    <option value="510300">510300 华泰柏瑞</option>
                    <option value="510310">510310 易方达</option>
                    <option value="510330">510330 华夏</option>
                    <option value="510360">510360 广发</option>
                    <option value="510350">510350 工银</option>
                    <option value="510390">510390 平安</option>
                    <option value="510320">510320 中金</option>
                    <option value="510380">510380 国泰</option>
                    <option value="510370">510370 兴业</option>
                </select>
            </div>
            <div class="control-item">
                <button id="resetAxis">重置纵轴+恢复默认区间</button>
            </div>
            <div class="update-info" id="updateInfo">
                最后更新：加载中...
            </div>
        </div>
        <!-- 折线图 -->
        <div id="chart"></div>
        <!-- 新增：变动百分比柱状图 -->
        <div id="barChart"></div>
        <div class="data-table">
            <h3>日度数据明细</h3>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>份额（亿份）</th>
                        <th>较前日变动（亿份）</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        <div class="source-note">
            <strong>说明：</strong>本工具每日18:00自动从上海证券交易所官网抓取最新清算后份额数据，覆盖2024-09-01以来所有交易日，数据100%来自上交所官方披露，无任何第三方估算。
        </div>
    </div>

    <script>
        // 初始化图表
        const chart = echarts.init(document.getElementById('chart'));
        const barChart = echarts.init(document.getElementById('barChart'));
        // 图表联动：tooltip和缩放自动同步
        echarts.connect([chart, barChart]);
        
        // 全局数据
        const allData = {
            dates: [],
            total: [],
            510300: [], 510310: [], 510330: [], 510360: [],
            510350: [], 510390: [], 510320: [], 510380: [], 510370: []
        };
        // ETF名称映射
        const etfNames = {
            total: '9只合计总份额',
            510300: '510300 华泰柏瑞沪深300ETF',
            510310: '510310 易方达沪深300ETF',
            510330: '510330 华夏沪深300ETF',
            510360: '510360 广发沪深300ETF',
            510350: '510350 工银沪深300ETF',
            510390: '510390 平安沪深300ETF',
            510320: '510320 中金沪深300ETF',
            510380: '510380 国泰沪深300ETF',
            510370: '510370 兴业沪深300ETF'
        };
        // 全局起始日期（默认区间）
        const GLOBAL_START_DATE = '2024-09-01';

        // 加载数据
        async function loadData() {
            try {
                // 从服务器加载最新的JSON数据，加时间戳防缓存
                const res = await fetch('etf_data.json?' + new Date().getTime());
                const data = await res.json();
                Object.assign(allData, data);
                // 初始化渲染
                renderChart('total');
                renderBarChart('total');
                renderTable('total');
                // 更新最后更新时间
                document.getElementById('updateInfo').textContent = `最后更新：${allData.dates[allData.dates.length-1]} 18:00:00`;
            } catch(e) {
                console.error('数据加载失败', e);
                alert('数据加载失败，请检查etf_data.json文件是否存在');
            }
        }

        // 计算当日变动百分比
        function calcDailyChangePercent(data) {
            const changePercent = [];
            const colors = [];
            for(let i = 0; i < data.length; i++) {
                if(i === 0) {
                    // 第一个日期无前日数据，空值
                    changePercent.push(null);
                    colors.push('transparent');
                } else {
                    const prev = data[i-1];
                    const curr = data[i];
                    const percent = ((curr - prev) / prev) * 100;
                    changePercent.push(percent);
                    // 颜色：流入（正）红色，流出（负）绿色
                    colors.push(percent >= 0 ? '#ef4444' : '#10b981');
                }
            }
            return { changePercent, colors };
        }

        // 渲染折线图（已改为直线，无平滑）
        function renderChart(key) {
            const data = allData[key];
            // 初始纵轴自适应全局数据
            const globalMin = Math.min(...data) * 0.99;
            const globalMax = Math.max(...data) * 1.01;

            const option = {
                title: {
                    text: etfNames[key] + ' 份额变化趋势',
                    left: 'center',
                    textStyle: { color: '#1f2937' }
                },
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        const date = params[0].axisValue;
                        const value = params[0].value;
                        return `日期：${date}<br/>份额：${value.toFixed(4)} 亿份`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '0%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: allData.dates,
                    axisLabel: {
                        rotate: 45,
                        fontSize: 10
                    },
                    axisTick: {
                        show: false
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '份额（亿份）',
                    min: globalMin,
                    max: globalMax,
                    splitLine: {
                        lineStyle: { type: 'dashed' }
                    }
                },
                series: [{
                    data: data,
                    type: 'line',
                    smooth: false, // 核心优化1：改为直线，取消平滑
                    lineStyle: {
                        width: 2,
                        color: key === 'total' ? '#ff0000' : '#0066cc'
                    },
                    itemStyle: {
                        color: key === 'total' ? '#ff0000' : '#0066cc'
                    },
                    areaStyle: {
                        color: {
                            type: 'linear',
                            x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [{
                                offset: 0, color: key === 'total' ? 'rgba(255,0,0,0.2)' : 'rgba(0,102,204,0.2)'
                            }, {
                                offset: 1, color: 'rgba(255,255,255,0)'
                            }]
                        }
                    }
                }],
                dataZoom: [
                    {
                        type: 'slider',
                        start: 0,
                        end: 100,
                        height: 15,
                        bottom: 0,
                        show: false // 隐藏折线图的slider，用柱状图的
                    },
                    {
                        type: 'inside',
                        start: 0,
                        end: 100
                    }
                ]
            };
            chart.setOption(option, true);

            // 绑定点击事件：纵轴自适应局部数据
            chart.off('click');
            chart.on('click', function(params) {
                const clickIndex = params.dataIndex;
                // 取点击位置前后5个数据，缩小区间突出波动
                const startIdx = Math.max(0, clickIndex - 5);
                const endIdx = Math.min(data.length - 1, clickIndex + 5);
                const rangeData = data.slice(startIdx, endIdx + 1);
                const localMin = Math.min(...rangeData) * 0.995;
                const localMax = Math.max(...rangeData) * 1.005;
                // 更新纵轴
                chart.setOption({
                    yAxis: { min: localMin, max: localMax }
                });
            });
        }

        // 渲染变动百分比柱状图（新增）
        function renderBarChart(key) {
            const data = allData[key];
            // 计算变动百分比和颜色
            const { changePercent, colors } = calcDailyChangePercent(data);

            const option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        const date = params[0].axisValue;
                        const value = params[0].value;
                        if(value === null) return `日期：${date}<br/>变动：无数据`;
                        const color = value >= 0 ? '红色' : '绿色';
                        const type = value >= 0 ? '流入' : '流出';
                        return `日期：${date}<br/>当日变动：${value >= 0 ? '+' : ''}${value.toFixed(4)}%<br/>状态：${type}（${color}柱子）`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    top: '5%',
                    bottom: '15%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: allData.dates,
                    axisLabel: {
                        rotate: 45,
                        fontSize: 10
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '变动%',
                    axisLabel: {
                        formatter: '{value}%'
                    },
                    splitLine: {
                        lineStyle: { type: 'dashed' }
                    }
                },
                series: [{
                    name: '当日变动百分比',
                    type: 'bar',
                    data: changePercent,
                    itemStyle: {
                        color: function(params) {
                            return colors[params.dataIndex];
                        }
                    },
                    barWidth: '60%'
                }],
                dataZoom: [
                    {
                        type: 'slider',
                        start: 0,
                        end: 100,
                        height: 20,
                        bottom: 0
                    },
                    {
                        type: 'inside',
                        start: 0,
                        end: 100
                    }
                ]
            };
            barChart.setOption(option, true);
        }

        // 渲染表格
        function renderTable(key) {
            const data = allData[key];
            const dates = allData.dates;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            // 倒序遍历，最新的在最上面
            for(let i = dates.length - 1; i >= 0; i--) {
                const date = dates[i];
                const value = data[i];
                const prevValue = i > 0 ? data[i-1] : value;
                const change = value - prevValue;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${date}</td>
                    <td>${value.toFixed(4)}</td>
                    <td style="color: ${change >= 0 ? '#ef4444' : '#10b981'}; font-weight: 500;">
                        ${change >= 0 ? '+' : ''}${change.toFixed(4)}
                    </td>
                `;
                tbody.appendChild(tr);
            }
        }

        // 重置按钮功能（核心优化2：恢复默认日期区间+重置纵轴）
        document.getElementById('resetAxis').addEventListener('click', function() {
            const currentKey = document.getElementById('etfSelect').value;
            // 重新渲染，回到初始状态
            renderChart(currentKey);
            renderBarChart(currentKey);
            // 重置dataZoom到全量区间
            chart.dispatchAction({
                type: 'dataZoom',
                start: 0,
                end: 100
            });
            barChart.dispatchAction({
                type: 'dataZoom',
                start: 0,
                end: 100
            });
            alert('已恢复默认区间：2024-09-01 ~ 最新日期，纵轴已重置');
        });

        // 选择器事件
        document.getElementById('etfSelect').addEventListener('change', function(e) {
            const key = e.target.value;
            renderChart(key);
            renderBarChart(key);
            renderTable(key);
        });

        // 窗口resize
        window.addEventListener('resize', function() {
            chart.resize();
            barChart.resize();
        });

        // 初始化
        loadData();
    </script>
</body>
</html>
