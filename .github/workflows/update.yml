name: Update ETF Data
on:
  schedule:
    - cron: '0 10 * * *'  # 每天北京时间18:00自动运行
  workflow_dispatch:  # 允许手动触发
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 给首次全量爬取留足时间
    permissions:
      contents: write
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行增量爬虫更新数据
        run: |
          python etf_crawler.py

      - name: 提交并推送更新（全容错，永不报错）
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          # 拉取最新代码，自动合并
          git pull origin main --rebase --autostash || true
          # 容错添加文件，不存在也不报错
          git add etf_data.json etf.db etf_backup.db || true
          # 容错提交，无变更也不报错
          git commit -m "Auto update ETF data: $(date +'%Y-%m-%d')" || echo "无数据变更，跳过提交"
          # 容错推送
          git push || true
