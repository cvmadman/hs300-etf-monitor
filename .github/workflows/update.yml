name: Update ETF Data

on:
  schedule:
    - cron: '0 10 * * *'  # 每天18点（UTC 10点）自动运行
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 给读写权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整克隆，解决pull的问题

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler
        run: |
          python etf_crawler.py

      - name: Commit and push changes
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          # 核心修复：先拉远程的最新变更，自动合并，再也不会push被拒
          git pull origin main --rebase --autostash
          git add etf_data.json
          git commit -m "Auto update data: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
